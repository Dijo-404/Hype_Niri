# Alacritty Configuration

[terminal.shell]
program = "/bin/zsh"

# ============ Font Configuration ============

[font]
size = 10.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
style = "Bold"

[font.italic]
style = "Italic"

[font.bold_italic]
style = "Bold Italic"

# ============ Window Appearance ============

[window]
decorations = "None"
dynamic_padding = true
opacity = 1.0

[window.padding]
x = 8
y = 8

# ============ Monochrome Color Scheme ============

[colors.primary]
background = "#141414"
foreground = "#d4d4d4"

[colors.cursor]
text = "#141414"
cursor = "#d4d4d4"

[colors.selection]
text = "#141414"
background = "#b0b0b0"

[colors.normal]
black = "#1c1c1c"
red = "#b0b0b0"
green = "#999999"
yellow = "#c0c0c0"
blue = "#888888"
magenta = "#a0a0a0"
cyan = "#777777"
white = "#d4d4d4"

[colors.bright]
black = "#404040"
red = "#cccccc"
green = "#b0b0b0"
yellow = "#d4d4d4"
blue = "#999999"
magenta = "#b0b0b0"
cyan = "#888888"
white = "#e8e8e8"

# ============ Scrolling ============

[scrolling]
history = 10000

# ============ Performance ============

[terminal]
osc52 = "CopyPaste"
