general {
    # If hyprlock is already running, do nothing; otherwise start it.
    lock_cmd = pidof hyprlock || hyprlock --immediate-render --no-fade-in
    unlock_cmd = niri msg action power-on-monitors
    # Lock via logind, then fall back to hyprlock directly if the d-bus call fails.
    before_sleep_cmd = loginctl lock-session || hyprlock --immediate-render --no-fade-in &
    after_sleep_cmd = niri msg action power-on-monitors
    ignore_dbus_inhibit = false
}

listener {
    timeout = 60                            # in seconds
    on-timeout = loginctl lock-session      # command to run when timeout has passed
}

listener {
    timeout = 90                            # in seconds
    on-timeout = niri msg action power-off-monitors # command to run when timeout has passed
    on-resume = niri msg action power-on-monitors  # command to run when activity is detected after timeout has fired.
}
