general {
    lock_cmd = pidof hyprlock || hyprlock --immediate-render --no-fade-in
    unlock_cmd = niri msg action power-on-monitors
    # Fall back to direct hyprlock if the d-bus lock call fails.
    before_sleep_cmd = loginctl lock-session || hyprlock --immediate-render --no-fade-in &
    after_sleep_cmd = niri msg action power-on-monitors
    ignore_dbus_inhibit = false
}

listener {
    timeout = 60
    on-timeout = loginctl lock-session
}

listener {
    timeout = 90
    on-timeout = niri msg action power-off-monitors
    on-resume = niri msg action power-on-monitors
}
