background {
    monitor =
    path = $HOME/.local/state/niri/current_wallpaper
    blur_passes = 1
    blur_size = 4
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 500, 150
    color = rgba(14, 14, 14, 0.75)
    border_size = 3
    border_color = rgba(176, 176, 176, 0.3)
    rounding = 20
    position = 0, -70
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] date +%H:%M
    color = rgb(212, 212, 212)
    font_size = 64
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -75
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %B %e"
    color = rgb(212, 212, 212)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -165
    halign = center
    valign = top
}

input-field {
    monitor =
    size = 300, 55
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(80, 80, 80, 1.0)
    inner_color = rgba(14, 14, 14, 0.75)
    font_color = rgb(212, 212, 212)
    fade_on_empty = false
    placeholder_text = "<i>Password...</i>"
    hide_input = false
    position = 0, 0
    halign = center
    valign = center
}
