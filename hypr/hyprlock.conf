# hyprlock -- monitor-agnostic, solid background. See INSTALL.md to use a wallpaper.

background {
    monitor =
    color = rgba(14, 14, 14, 1.0)
}

shape {
    monitor =
    size = 800, 240
    color = rgba(14, 14, 14, 0.75)
    border_size = 6
    border_color = rgba(176, 176, 176, 0.3)
    rounding = 32
    position = 0, -112
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(212, 212, 212)
    font_size = 108
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -122
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %e")"
    color = rgb(212, 212, 212)
    font_size = 36
    font_family = JetBrainsMono Nerd Font
    position = 0, -272
    halign = center
    valign = top
}

input-field {
    monitor =
    size = 500, 100
    outline_thickness = 6
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(80, 80, 80, 1.0)
    inner_color = rgba(14, 14, 14, 0.75)
    font_color = rgb(212, 212, 212)
    fade_on_empty = false
    placeholder_text = "<i>Password...</i>"
    hide_input = true
    position = 0, 0
    halign = center
    valign = center
}
