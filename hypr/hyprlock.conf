background {
    monitor =
    path = $HOME/.local/state/hypr/current_wallpaper
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

shape {
    monitor = DP-3
    size = 400, 120
    color = rgba(14, 14, 14, 0.75)
    border_size = 2
    border_color = rgba(176, 176, 176, 0.3)
    rounding = 16
    position = 0, -57
    halign = center
    valign = top
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(212, 212, 212)
    font_size = 54
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -61
    halign = center
    valign = top
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +"%A, %B %e")"
    color = rgb(212, 212, 212)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -136
    halign = center
    valign = top
}

input-field {
    monitor = DP-3
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(80, 80, 80, 1.0)
    inner_color = rgba(14, 14, 14, 0.75)
    font_color = rgb(212, 212, 212)
    fade_on_empty = false
    placeholder_text = "<i>Password...</i>"
    hide_input = false
    position = 0, 0
    halign = center
    valign = center
}

shape {
    monitor = eDP-1
    size = 800, 240
    color = rgba(14, 14, 14, 0.75)
    border_size = 6
    border_color = rgba(176, 176, 176, 0.3)
    rounding = 32
    position = 0, -112
    halign = center
    valign = top
}

label {
    monitor = eDP-1
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(212, 212, 212)
    font_size = 108
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -122
    halign = center
    valign = top
}

label {
    monitor = eDP-1
    text = cmd[update:1000] echo "$(date +"%A, %B %e")"
    color = rgb(212, 212, 212)
    font_size = 36
    font_family = JetBrainsMono Nerd Font
    position = 0, -272
    halign = center
    valign = top
}

input-field {
    monitor = eDP-1
    size = 500, 100
    outline_thickness = 6
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(80, 80, 80, 1.0)
    inner_color = rgba(14, 14, 14, 0.75)
    font_color = rgb(212, 212, 212)
    fade_on_empty = false
    placeholder_text = "<i>Password...</i>"
    hide_input = false
    position = 0, 0
    halign = center
    valign = center
